      <p>
        Judy Tseng, 80, of San Francisco, California, passed away peacefully at home
        on January 28, 2026, surrounded by her loving family. She was born on
        March 12, 1945, in Guangzhou, China, and immigrated to the United States
        in 1968 with her husband, Robert Chen, where they built a life rooted in
        hard work, community, and deep family bonds.
      </p>

      <p>

        cook whose kitchen was always open to neighbors, friends, and anyone who
        needed a warm meal and a listening ear. She was known for her infectious
        smile, her sharp wit, and her unwavering generosity of spirit.
      </p>

      <h2>Early Life</h2>
      <p>
        Born the eldest of four children, Judy grew up in Guangzhou during a time
        of great change and challenge. Her parents instilled in her a love of
        learning, a strong work ethic, and a deep respect for family. She excelled
        in her studies and dreamed of seeing the world beyond her hometown.
      </p>
      <p>

      </p>
      <p>

  <script>
    function showLang(lang) {
      const elements = document.querySelectorAll('[id$="-en"], [id$="-zh"]');
      elements.forEach(el => {
        const isEnglish = el.id.endsWith('-en');
        const shouldShow = (lang === 'en' && isEnglish) || (lang === 'zh' && !isEnglish);
        el.classList.toggle('visible', shouldShow);
      });

      document.getElementById('btn-en').classList.toggle('active', lang === 'en');
      document.getElementById('btn-zh').classList.toggle('active', lang === 'zh');
      document.documentElement.lang = lang;
    }

  </script>
