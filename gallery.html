<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Photo Gallery &mdash; In Memory of Judy Chen</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <header>
    <div class="header-inner">
      <a class="site-title" href="index.html">In Memory of Judy Chen</a>
      <nav>
        <a href="index.html">Home</a>
        <a href="obituary.html">Obituary</a>
        <a href="gallery.html" class="active">Gallery</a>
      </nav>
    </div>
  </header>

  <main>

    <div class="gallery-header">
      <h1>Photo Gallery</h1>
      <p>A collection of cherished memories &mdash; a life beautifully lived.</p>
    </div>

    <!--
      Replace the ALBUM_URL placeholder below with the sharing link from your
      public Google Photos album.

      To find the sharing link:
        1. Open your Google Photos album in a browser.
        2. Click the share icon (or the three-dot menu ⋮ → "Share album").
        3. Copy the link (looks like: https://photos.app.goo.gl/XXXXXXXXXXXXXXXXX).
        4. Paste it as the value of the href AND data-album-url attributes below.

      Google Photos does not allow iframe embedding, so the album opens in a
      new tab — which is the intended behaviour.
    -->
    <a
      id="gallery-link"
      class="gallery-card"
      href="https://photos.app.goo.gl/REPLACE_WITH_YOUR_ALBUM_ID"
      target="_blank"
      rel="noopener noreferrer"
      aria-label="Open photo gallery in Google Photos"
    >
      <div class="gallery-card-icon" aria-hidden="true">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="1.2" stroke-linecap="round"
             stroke-linejoin="round" width="56" height="56">
          <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
          <circle cx="8.5" cy="8.5" r="1.5"/>
          <polyline points="21 15 16 10 5 21"/>
        </svg>
      </div>
      <p class="gallery-card-label">View Photo Album in Google Photos</p>
      <p class="gallery-card-sub">Opens in a new tab &rarr;</p>
    </a>

  </main>

  <footer>
    <p>In Loving Memory of Judy Chen &bull; 1945 &ndash; 2026</p>
  </footer>

  <script>
    /*
     * Update the gallery link href at runtime if a data attribute is set.
     * To point to a real album, simply update the href on #gallery-link.
     */
  </script>

</body>
</html>
