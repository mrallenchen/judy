<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Photo Gallery &mdash; In Loving Memory of Judy Tseng</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <header>
    <div class="header-inner">
      <a class="site-title" href="index.html">In Loving Memory of Judy Tseng &#8226; 紀念曾麗喜</a>
      <nav>
        <a href="index.html">Home &#8226; 首頁</a>
        <a href="biography.html">Biography &#8226; 生平事略</a>
        <a href="gallery.html">Gallery &#8226; 照片集</a>
      </nav>
    </div>
  </header>

  <main>

    <div class="gallery-header">
      <h1>Photo Gallery &#8226; 照片集</h1>
      <p>
        A collection of cherished memories &mdash; a life beautifully lived.<br />
        珍貴回憶的集錦 &mdash; 一段美麗的人生。
      </p>
    </div>

    <!-- Photo Grid -->
    <div id="photoGrid" class="photo-grid">
      <!-- Photos will be dynamically inserted here by JavaScript -->
    </div>

    <!-- Lightbox Modal -->
    <div id="lightbox" class="lightbox" role="dialog" aria-modal="true" aria-label="Photo viewer">
      <button class="lightbox-close" aria-label="Close photo viewer">&times;</button>

      <div class="lightbox-content">
        <button class="lightbox-nav lightbox-prev" aria-label="Previous photo">&#8249;</button>
        <img id="lightboxImage" src="" alt="Gallery photo" />
        <button class="lightbox-nav lightbox-next" aria-label="Next photo">&#8250;</button>
      </div>

      <div class="lightbox-controls">
        <button id="slideshowToggle" class="slideshow-btn" aria-label="Toggle slideshow">
          <span class="play-icon">▶</span>
          <span class="pause-icon" style="display:none;">⏸</span>
        </button>
        <div class="lightbox-counter">
          <span id="currentPhoto">1</span> / <span id="totalPhotos">0</span>
        </div>
      </div>
    </div>

  </main>

  <footer>
    <p>In Loving Memory of Judy Tseng &#8226; 紀念曾麗喜 &#8226; 1945 &ndash; 2026</p>
  </footer>

  <script src="gallery.js"></script>
</body>
</html>
